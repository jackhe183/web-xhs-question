        .match-city-line span { font-size: 22px; margin-left: 5px; position: relative; }
        .match-city-line span::after { content: ''; position: absolute; bottom: 2px; left: 0; width: 100%; height: 8px; background: rgba(250, 206, 21, 0.4); z-index: -1; border-radius: 4px; }

        .tags-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .res-tag-pill { background: var(--light-teal-bg); color: #406e75; font-size: 11px; padding: 5px 12px; border-radius: 10px; font-weight: 600; }

        .reason-head { font-size: 13px; font-weight: 800; color: var(--primary-teal); margin-bottom: 5px; }
        .reason-text { font-size: 12px; color: #555; line-height: 1.6; text-align: justify; }

        .alt-title { font-size: 11px; color: #aaa; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .alt-list { display: flex; flex-direction: column; gap: 10px; /* 增加间距 */ }
        .alt-item { 
            display: flex; justify-content: space-between; align-items: center;

        .alt-left { display: flex; align-items: center; gap: 8px; }
        .alt-name { font-size: 14px; font-weight: 700; color: #333; }

            background: var(--text-dark); color: #fff; border: none; padding: 18px; 
            border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer;

    let step = 0;
    let scores = { A:0, B:0, C:0, D:0, E:0 };

    function startQuiz() {
        document.getElementById('page-cover').classList.remove('active');
        document.getElementById('page-quiz').classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[step];
        const displayNum = step + 1 < 10 ? '0' + (step + 1) : (step + 1);
        document.getElementById('curr-num').innerText = displayNum;
        document.getElementById('p-bar').style.width = ((step + 1) / 36 * 100) + '%';
        document.getElementById('q-text').innerText = q.q;

        const container = document.getElementById('opt-list');
        container.innerHTML = '';
        q.opts.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                scores[opt.s]++;
                if(step < 35) {
                    step++;
                    renderQuestion();
                } else {
                    showResult();
                }
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        let maxDim = 'A';
        for (let dim in scores) {
            if (scores[dim] > scores[maxDim]) maxDim = dim;
        }

        const cityPool = cityData[maxDim];
        const res = cityPool[Math.floor(Math.random() * cityPool.length)];
        
        // 主分数
        const randomScore = Math.floor(Math.random() * (99 - 85 + 1)) + 85;

        document.getElementById('res-score').innerText = randomScore + "%";
        document.getElementById('res-city').innerText = res.city;
        document.getElementById('res-reason').innerText = res.desc;

        // 标签渲染
        const tagsContainer = document.getElementById('res-tags-container');
        tagsContainer.innerHTML = '';
        res.vibeTags.forEach(tag => {
            const tagEl = document.createElement('div');
            tagEl.className = 'res-tag-pill';
            tagEl.innerText = tag;
            tagsContainer.appendChild(tagEl);
        });

        // --- 核心更新：生成2个备选城市 ---
        // 1. 扁平化所有城市
        let allCities = [];
        for (let key in cityData) {
            allCities = allCities.concat(cityData[key]);
        }
        
        // 2. 剔除已选中的主城市
        const remainingCities = allCities.filter(c => c.city !== res.city);
        
        // 3. 随机打乱并取前2个
        remainingCities.sort(() => Math.random() - 0.5);
        const alternatives = remainingCities.slice(0, 2);

        // 4. 渲染备选城市列表
        const altContainer = document.getElementById('alt-cities-list');
        altContainer.innerHTML = '';
        
        alternatives.forEach((alt, index) => {
            // 生成递减的假分数 (主分数 - 3% ~ 5% 的梯度)
            const altScore = randomScore - (index * 3) - Math.floor(Math.random() * 3) - 2;
            
            const div = document.createElement('div');
            div.className = 'alt-item';
            div.innerHTML = `
                <div class="alt-left">
                    <span class="alt-name">${alt.city}</span>
                    <span class="alt-tag">${alt.vibeTags[0]}</span>
                </div>
                <span class="alt-score">${altScore}%</span>
            `;
            altContainer.appendChild(div);
        });

        document.getElementById('page-quiz').classList.remove('active');
        document.getElementById('page-result').classList.add('active');
    }
</script>
