<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="发现你的情感人格类型">
    <title>发现你的情感人格类型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow-x: hidden; }

        body {
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd9c8 100%);
            min-height: 100vh;
            position: relative;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main {
            background: linear-gradient(135deg, #ff6b35 0%, #ee4d2d 100%);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15);
            transition: all 0.3s;
            width: 80%;
            max-width: 300px;
            display: block;
            margin: 0 auto;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255, 107, 53, 0.25); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .password-page { text-align: center; background: rgba(255,255,255,0.9); padding: 40px 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15); }
        .password-inputs { display: flex; justify-content: center; gap: 10px; margin: 24px 0; }
        .password-input {
            width: 50px; height: 60px; border: 2px solid rgba(255, 107, 53, 0.2); border-radius: 12px;
            font-size: 24px; text-align: center; background: #fff; outline: none; transition: 0.2s;
        }
        .password-input:focus { border-color: #ff6b35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }
        .error-message { color: #ee4d2d; font-size: 14px; margin-top: 16px; min-height: 20px; opacity: 0; transition: 0.3s; }

        .cover-page { text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.9); border-radius: 20px; box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15); }
        .cover-icon { font-size: 70px; margin-bottom: 20px; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .cover-title { font-size: 32px; color: #1a1a1a; margin-bottom: 10px; }
        .cover-subtitle { color: #ff6b35; font-weight: bold; margin-bottom: 20px; }
        .cover-description { color: #666; line-height: 1.6; margin-bottom: 30px; font-size: 14px; }

        .quiz-page { width: 100%; }
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; color: #666; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255, 107, 53, 0.1); border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #ff6b35 0%, #ee4d2d 100%); width: 0%; transition: width 0.4s ease; }
        .question-card { background: #fff; border-radius: 20px; padding: 30px 20px; box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15); transition: 0.3s; }
        .question-text { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 24px; line-height: 1.4; }
        .option-button {
            width: 100%; background: #fff; border: 1.5px solid rgba(255, 107, 53, 0.2);
            padding: 16px; font-size: 15px; color: #1a1a1a; border-radius: 12px;
            cursor: pointer; text-align: left; margin-bottom: 12px; transition: 0.2s; outline: none;
        }
        .option-button:hover { border-color: #ff6b35; background: #fff0e8; }

        .result-card { background: #fff; border-radius: 20px; padding: 40px 20px; box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15); text-align: center; }
        .match-percentage { font-size: 60px; font-weight: 800; background: linear-gradient(135deg, #ff6b35 0%, #ee4d2d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .result-type-name { font-size: 26px; color: #1a1a1a; margin: 15px 0; font-weight: bold; }
        .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .tag { background: #fff0e8; color: #ff6b35; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .detail-analysis { background: #fafafa; border-radius: 12px; padding: 20px; text-align: left; margin-bottom: 24px; font-size: 14px; line-height: 1.6; }
        .detail-label { font-weight: bold; color: #ff6b35; }
        .result-description { font-size: 14px; color: #555; text-align: justify; line-height: 1.7; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 密码页面 -->
        <div class="page active" id="passwordPage">
            <div class="password-page">
                <div style="font-size: 50px; margin-bottom: 15px;">🔐</div>
                <h2>输入密码解锁</h2>
                <p style="color:#888; font-size:12px; margin-top:5px;">密码为 4 位数字 (演示密码: 1234)</p>
                <div class="password-inputs">
                    <input type="text" class="password-input" maxlength="1" inputmode="numeric" autofocus>
                    <input type="text" class="password-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="password-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="password-input" maxlength="1" inputmode="numeric">
                </div>
                <button class="btn-main" id="passwordSubmit" disabled>确认进入</button>
                <div class="error-message" id="errorMessage">密码错误，请重试</div>
            </div>
        </div>

        <!-- 封面页 -->
        <div class="page" id="coverPage">
            <div class="cover-page">
                <div class="cover-icon">💕</div>
                <h1 class="cover-title">发现你的情感人格类型</h1>
                <p class="cover-subtitle">已有一万人找到自己的爱情模式</p>
                <p class="cover-description">
                    通过专业的情感心理学分析，探索你在感情中的真实模样，找到最适合你的爱情表达方式。
                </p>
                <button class="btn-main" id="startQuiz">开始测试</button>
            </div>
        </div>

        <!-- 答题页 -->
        <div class="page" id="quizPage">
            <div class="quiz-page">
                <div class="progress-header">
                    <span id="questionNumber">问题 1/20</span>
                    <span id="progressPercentage" style="color:#ff6b35; font-weight:bold;">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="question-card" id="questionCard">
                    <div class="question-text" id="questionText">题目加载中...</div>
                    <div id="optionsList"></div>
                </div>
            </div>
        </div>

        <!-- 结果页 -->
        <div class="page" id="resultPage">
            <div class="result-card">
                <div style="font-size: 12px; color:#999; margin-bottom: 5px;">综合匹配度</div>
                <div class="match-percentage" id="matchPercentage">95%</div>
                <h2 class="result-type-name" id="resultTypeName">热烈浪漫型</h2>
                <div class="tags-container" id="tagsContainer"></div>

                <div class="detail-analysis">
                    <p><span class="detail-label">最佳匹配：</span><span id="bestMatch"></span></p>
                    <p style="margin-top: 10px;"><span class="detail-label">潜在挑战：</span><span id="potentialChallenge"></span></p>
                </div>

                <div class="result-description" id="resultDescription"></div>
                <button class="btn-main" id="restartQuiz">再测一次</button>
            </div>
        </div>
    </div>

    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {

            // ==================== 配置 ====================
            const CORRECT_PASSWORD = "1234";

            const questions = [
                { q: "当遇到心动对象时，你会？", opts: [
                    { t: "主动出击，直接表达好感", scores: { A: 3, B: 1, C: 0, D: 2 } },
                    { t: "默默关注，等待时机", scores: { A: 0, B: 3, C: 1, D: 2 } },
                    { t: "通过朋友侧面了解", scores: { A: 1, B: 2, C: 3, D: 0 } },
                    { t: "保持理智，观察再决定", scores: { A: 0, B: 1, C: 3, D: 2 } }
                ]},
                { q: "你对感情的理想状态是？", opts: [
                    { t: "轰轰烈烈，充满激情", scores: { A: 3, B: 0, C: 0, D: 1 } },
                    { t: "细水长流，温暖陪伴", scores: { A: 0, B: 3, C: 1, D: 0 } },
                    { t: "彼此独立，互相尊重", scores: { A: 0, B: 1, C: 1, D: 3 } },
                    { t: "稳定可靠，有共同规划", scores: { A: 0, B: 1, C: 3, D: 1 } }
                ]},
                { q: "当伴侣情绪低落时，你通常会？", opts: [
                    { t: "耐心倾听，给予情感支持", scores: { A: 2, B: 3, C: 0, D: 0 } },
                    { t: "分析问题，提供解决方案", scores: { A: 0, B: 1, C: 3, D: 0 } },
                    { t: "用行动逗TA开心", scores: { A: 3, B: 1, C: 0, D: 1 } },
                    { t: "给TA空间，自己调节", scores: { A: 0, B: 0, C: 1, D: 3 } }
                ]},
                { q: "面对矛盾和争吵，你的方式是？", opts: [
                    { t: "主动沟通，寻求解决", scores: { A: 2, B: 1, C: 3, D: 1 } },
                    { t: "冷静后慢慢谈", scores: { A: 0, B: 2, C: 1, D: 3 } },
                    { t: "先安抚情绪，再谈问题", scores: { A: 2, B: 3, C: 0, D: 0 } },
                    { t: "表达感受，期待理解", scores: { A: 3, B: 2, C: 0, D: 1 } }
                ]},
                { q: "你如何表达爱意？", opts: [
                    { t: "直接说出口，不吝啬表达", scores: { A: 3, B: 1, C: 0, D: 0 } },
                    { t: "通过细心照顾和陪伴", scores: { A: 0, B: 3, C: 0, D: 1 } },
                    { t: "用实际行动和付出", scores: { A: 1, B: 1, C: 3, D: 0 } },
                    { t: "尊重对方，给予空间", scores: { A: 0, B: 1, C: 0, D: 3 } }
                ]},
                { q: "在感情中你最害怕的是？", opts: [
                    { t: "失去激情和新鲜感", scores: { A: 3, B: 0, C: 0, D: 0 } },
                    { t: "被误解和不被理解", scores: { A: 0, B: 3, C: 0, D: 1 } },
                    { t: "不稳定和不确定性", scores: { A: 0, B: 0, C: 3, D: 0 } },
                    { t: "失去自我和独立性", scores: { A: 0, B: 0, C: 0, D: 3 } }
                ]},
                { q: '你眼中的"真爱"是？', opts: [
                    { t: "心动不止，热情永驻", scores: { A: 3, B: 0, C: 0, D: 0 } },
                    { t: "相濡以沫，陪伴是最长情的", scores: { A: 0, B: 3, C: 1, D: 0 } },
                    { t: "相互成就，共同成长", scores: { A: 0, B: 0, C: 3, D: 1 } },
                    { t: "彼此自由，心却相连", scores: { A: 1, B: 0, C: 0, D: 3 } }
                ]},
                { q: "你希望伴侣给你的承诺是？", opts: [
                    { t: "永远爱我，永不变心", scores: { A: 3, B: 1, C: 0, D: 0 } },
                    { t: "陪伴我，理解我", scores: { A: 0, B: 3, C: 0, D: 1 } },
                    { t: "对未来负责，共同规划", scores: { A: 0, B: 0, C: 3, D: 0 } },
                    { t: "尊重我，信任我", scores: { A: 0, B: 1, C: 0, D: 3 } }
                ]}
            ];

            const resultTypes = {
                "A": {
                    typeName: "热烈浪漫型",
                    tags: ["主动", "热情", "表达", "勇敢", "浪漫"],
                    bestMatch: "温柔陪伴型（可以平衡你的热烈，给予稳定的情感支持）",
                    potentialChallenge: "可能在长期关系中难以保持激情，容易产生审美疲劳",
                    desc: "你是一个敢爱敢恨的人，在感情中从不吝啬表达自己的情感。你相信爱情应该是热烈而直接的，追求心动的感觉和浪漫的体验。你的真诚和勇敢让人感受到爱的温度，你的热情能够点燃整个关系。"
                },
                "B": {
                    typeName: "温柔陪伴型",
                    tags: ["细腻", "陪伴", "体贴", "耐心", "温暖"],
                    bestMatch: "理性分析型（可以给你安全感和方向感）",
                    potentialChallenge: "可能过于迁就对方，忽略自己的需求",
                    desc: "你相信细水长流的感情，懂得用细腻的心思去经营关系。你擅长倾听和陪伴，能够敏锐地察觉到对方的情感需求。你的温柔体贴让伴侣感受到家的温暖。"
                },
                "C": {
                    typeName: "理性分析型",
                    tags: ["理性", "观察", "谨慎", "稳定", "深沉"],
                    bestMatch: "热烈浪漫型（可以为你的生活带来激情和活力）",
                    potentialChallenge: "可能过于理性，忽略了情感交流的重要性",
                    desc: "你在感情中保持清醒的头脑，善于分析和规划。你重视关系的稳定性和未来可能性，会用实际行动去维护感情。你的靠谱和稳重给人安全感。"
                },
                "D": {
                    typeName: "自由灵魂型",
                    tags: ["独立", "自由", "真实", "随性", "真诚"],
                    bestMatch: "温柔陪伴型（可以给你理解和支持，不过分束缚）",
                    potentialChallenge: "可能被误解为不够投入，需要平衡独立与亲密",
                    desc: "你追求平等与尊重的关系，认为每个人都应该保持独立的自我。你随性自然，不喜欢被束缚，相信真正的爱是让彼此都成为更好的人。"
                }
            };

            // ==================== 状态变量 ====================
            let currentQuestion = 0;
            let userScores = { A: 0, B: 0, C: 0, D: 0 };

            // ==================== 工具函数 ====================
            function showPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            }

            // ==================== 密码验证 ====================
            const inputs = document.querySelectorAll('.password-input');
            const submitBtn = document.getElementById('passwordSubmit');
            const errorMsg = document.getElementById('errorMessage');

            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    const allFilled = Array.from(inputs).every(inp => inp.value !== '');
                    submitBtn.disabled = !allFilled;
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            submitBtn.addEventListener('click', function() {
                const pwd = Array.from(inputs).map(inp => inp.value).join('');
                if (pwd === CORRECT_PASSWORD) {
                    errorMsg.style.opacity = '0';
                    showPage('coverPage');
                } else {
                    errorMsg.style.opacity = '1';
                    inputs.forEach(inp => inp.value = '');
                    inputs[0].focus();
                    submitBtn.disabled = true;
                }
            });

            // ==================== 开始测试 ====================
            document.getElementById('startQuiz').addEventListener('click', function() {
                currentQuestion = 0;
                userScores = { A: 0, B: 0, C: 0, D: 0 };

                // 修复卡片透明不可见的Bug
                const card = document.getElementById('questionCard');
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';

                showPage('quizPage');
                renderQuestion();
            });

            // ==================== 渲染题目 ====================
            function renderQuestion() {
                // 安全检查：确保题目索引有效
                if (!questions || questions.length === 0 || currentQuestion >= questions.length) {
                    console.error('题目数据错误：questions数组为空或索引超出范围');
                    document.getElementById('questionText').textContent = '题目加载失败，请重新开始';
                    return;
                }

                const q = questions[currentQuestion];
                if (!q || !q.q || !q.opts) {
                    console.error('题目数据格式错误：', q);
                    document.getElementById('questionText').textContent = '题目数据错误，请重新开始';
                    return;
                }

                document.getElementById('questionNumber').textContent = `问题 ${currentQuestion + 1}/${questions.length}`;
                const progress = ((currentQuestion) / questions.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressPercentage').textContent = Math.round(progress) + '%';
                document.getElementById('questionText').textContent = q.q;

                const optionsBox = document.getElementById('optionsList');
                optionsBox.innerHTML = '';
                q.opts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-button';
                    btn.textContent = opt.t;
                    btn.onclick = function() { handleSelect(opt.scores); };
                    optionsBox.appendChild(btn);
                });
            }

            // ==================== 处理选择 ====================
            function handleSelect(scores) {
                for (let type in scores) {
                    userScores[type] += scores[type];
                }

                const card = document.getElementById('questionCard');
                card.style.opacity = '0';
                card.style.transform = 'translateY(10px)';

                setTimeout(function() {
                    if (currentQuestion < questions.length - 1) {
                        currentQuestion++;
                        renderQuestion();
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    } else {
                        calculateResult();
                    }
                }, 300);
            }

            // ==================== 计算结果 ====================
            function calculateResult() {
                let maxType = 'A';
                for (let type in userScores) {
                    if (userScores[type] > userScores[maxType]) maxType = type;
                }

                const result = resultTypes[maxType];
                const matchPercent = Math.floor(Math.random() * 15) + 85;

                document.getElementById('matchPercentage').textContent = matchPercent + '%';
                document.getElementById('resultTypeName').textContent = result.typeName;
                document.getElementById('bestMatch').textContent = result.bestMatch;
                document.getElementById('potentialChallenge').textContent = result.potentialChallenge;
                document.getElementById('resultDescription').textContent = result.desc;

                const tagsBox = document.getElementById('tagsContainer');
                tagsBox.innerHTML = '';
                result.tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = tag;
                    tagsBox.appendChild(span);
                });

                showPage('resultPage');
            }

            // ==================== 重新测试 ====================
            document.getElementById('restartQuiz').addEventListener('click', function() {
                // 重置所有状态
                currentQuestion = 0;
                userScores = { A: 0, B: 0, C: 0, D: 0 };
                // 重置进度条
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressPercentage').textContent = '0%';
                // 修复卡片透明不可见的Bug
                const card = document.getElementById('questionCard');
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
                // 回到封面页
                showPage('coverPage');
            });
        });
    </script>
</body>
</html>
